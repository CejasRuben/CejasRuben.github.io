<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descargas - Archivos</title>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: "Courier New", Courier, monospace;
      margin: 20px;
      line-height: 1.4;
    }

    h1 {
      font-size: 28px;
      font-weight: bold;
      margin: 0 0 20px 0;
      color: #ff0000;
      text-align: center;
    }

    .archivo h2 {
      margin: 0;
      font-size: 18px;
      font-weight: bold;
      color: #ff0000;
    }

    .leyenda {
      font-size: 13px;
      color: #ffffff;
      margin: 4px 0 25px 0;
      line-height: 1.2;
    }

    a {
      font-family: "Courier New", Courier, monospace;
      font-weight: bold;
      color: #ff0000;
      text-decoration: none;
      display: inline-block;
    }

    a:visited {
      color: #ff0000;
    }

    a:hover {
      text-decoration: underline;
    }

    .separador {
      border: none;
      border-top: 1px solid #333;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <h1>Investigo en Bluesky</h1>

  <div class="archivo">
    <h2><a href="https://drive.google.com/uc?export=download&id=TU_ID_ARCHIVO_1" target="_blank">PATRIARCHY</a></h2>
  </div>
  <div class="leyenda">
    Clasificación temática en 48 categorías de 127027 posteos en inglés publicados entre el 2025-05-10 y el 2025-09-21.
  </div>
  <hr class="separador">

  <div class="archivo">
    <h2><a href="https://drive.google.com/uc?export=download&id=TU_ID_ARCHIVO_3" target="_blank">HOMOPHOBIA</a></h2>
  </div>
  <div class="leyenda">
    Clasificación temática en 46 categorías de 53264 posteos en inglés publicados entre el 2024-09-21 y el 2025-09-21.
  </div>
</body>
</html>
