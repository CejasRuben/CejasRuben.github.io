<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descargas - Archivos</title>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      /* Fuente clásica de los 90: monoespaciada, como en terminales y BBS */
      font-family: "Courier New", Courier, monospace;
      margin: 20px;
      line-height: 1.4;
    }

    h1 {
      font-size: 28px; /* Tamaño fijo típico de los 90 */
      font-weight: bold;
      margin: 0 0 15px 0;
      color: #ff0000; /* Rojo puro, como en los CRT */
    }

    .archivo {
      font-size: 16px;
      margin: 8px 0;
    }

    a {
      font-family: "Courier New", Courier, monospace;
      font-weight: bold;
      color: #ff0000;
      text-decoration: none; /* Sin subrayado, como pediste */
      display: inline-block;
    }

    a:visited {
      color: #ff0000;
    }

    a:hover {
      text-decoration: underline; /* Solo al pasar: comportamiento clásico */
    }
  </style>
</head>
<body>
  <h1>Investigo en Bluesky</h1>
  <div class="archivo">
    <a href="https://drive.google.com/uc?export=download&id=TU_ID_ARCHIVO_1" target="_blank">PATRIARCHY</a>
  </div>
  <div class="archivo">
    <a href="https://drive.google.com/uc?export=download&id=TU_ID_ARCHIVO_2" target="_blank">MISOGYNY</a>
  </div>
  <div class="archivo">
    <a href="https://drive.google.com/uc?export=download&id=TU_ID_ARCHIVO_3" target="_blank">HOMOPHOBIA</a>
  </div>
</body>
</html>
